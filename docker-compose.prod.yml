name: securo

# podman-compose groups all services into a single pod by default, which
# interferes with per-service port mapping and networking. Disabling it makes
# podman-compose behave like Docker Compose. Docker ignores unknown top-level
# x- keys.
x-podman:
  in_pod: false

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/securo
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
  DEBUG: ${DEBUG:-false}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID:-}
  PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET:-}
  PLUGGY_OAUTH_REDIRECT_URI: ${PLUGGY_OAUTH_REDIRECT_URI:-http://localhost:3000/oauth/callback}
  ENABLE_BANKING_APP_ID: ${ENABLE_BANKING_APP_ID:-}
  ENABLE_BANKING_PRIVATE_KEY_FILE: ${ENABLE_BANKING_PRIVATE_KEY_FILE:-/app/secrets/enable_banking_private.pem}
  ENABLE_BANKING_API_URL: ${ENABLE_BANKING_API_URL:-https://api.enablebanking.com}
  ENABLE_BANKING_OAUTH_REDIRECT_URI: ${ENABLE_BANKING_OAUTH_REDIRECT_URI:-http://localhost:3000/oauth/callback}
  SIMPLEFIN_ENABLED: ${SIMPLEFIN_ENABLED:-false}
  SIMPLEFIN_API_URL: ${SIMPLEFIN_API_URL:-https://beta-bridge.simplefin.org}
  OPENEXCHANGERATES_APP_ID: ${OPENEXCHANGERATES_APP_ID:-}
  FX_SYNC_MODE: ${FX_SYNC_MODE:-on_demand}
  REDIS_URL: redis://redis:6379/0
  STORAGE_LOCAL_PATH: /app/data/attachments
  AGENTS_KNOWLEDGE_STORAGE_PATH: /app/data/agent_knowledge
  # Agents/LLM feature — opt-in. Off by default so existing users pay
  # zero cost. Run `docker compose -f docker-compose.prod.yml --profile
  # agents up` after enabling.
  AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
  AGENTS_BUILTIN_MCP_URL: ${AGENTS_BUILTIN_MCP_URL:-http://mcp-server:8765/mcp}
  AGENTS_EXTRA_MCP_SERVERS: ${AGENTS_EXTRA_MCP_SERVERS:-}
  AGENTS_MCP_JWT_SECRET: ${AGENTS_MCP_JWT_SECRET:-dev-mcp-secret-change-in-production}
  # TTL for tokens minted from /agents/connections → "External MCP access".
  # Used by Claude Desktop, n8n, custom clients plugging into Securo.
  AGENTS_MCP_EXTERNAL_TTL_DAYS: ${AGENTS_MCP_EXTERNAL_TTL_DAYS:-90}
  # LLM provider config — only the provider you actually use needs setting.
  AGENTS_DEFAULT_PROVIDER: ${AGENTS_DEFAULT_PROVIDER:-ollama}
  AGENTS_DEFAULT_MODEL: ${AGENTS_DEFAULT_MODEL:-}
  AGENTS_OLLAMA_BASE_URL: ${AGENTS_OLLAMA_BASE_URL:-http://ollama:11434}
  AGENTS_OPENAI_API_KEY: ${AGENTS_OPENAI_API_KEY:-}
  AGENTS_ANTHROPIC_API_KEY: ${AGENTS_ANTHROPIC_API_KEY:-}
  AGENTS_OPENAI_COMPAT_BASE_URL: ${AGENTS_OPENAI_COMPAT_BASE_URL:-}
  AGENTS_OPENAI_COMPAT_API_KEY: ${AGENTS_OPENAI_COMPAT_API_KEY:-}
  # Knowledge-base embeddings. `native` (default) uses fastembed with a
  # bundled multilingual model — zero external setup. Override with
  # ollama/openai/openai_compatible for better quality.
  AGENTS_EMBEDDING_PROVIDER: ${AGENTS_EMBEDDING_PROVIDER:-native}
  AGENTS_EMBEDDING_MODEL: ${AGENTS_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}

x-backend-base: &backend-base
  image: ghcr.io/securo-finance/securo-backend:latest
  environment: *backend-env
  depends_on:
    db: { condition: service_healthy }
    redis: { condition: service_healthy }
  volumes:
    - ./secrets:/app/secrets:ro
    - attachments:/app/data/attachments
    - agent_knowledge:/app/data/agent_knowledge
    - agent_embedding_models:/app/data/embedding_models
  restart: unless-stopped

services:
  redis:
    image: docker.io/library/redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    # docker.io/pgvector/pgvector:pg16 is a drop-in replacement for postgres:16
    # that bundles the pgvector extension, required by the agents
    # knowledge-base (RAG) migration introduced in v0.11.0.
    image: ${DB_IMAGE:-docker.io/pgvector/pgvector:pg16}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-base
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    # No host port published — the frontend (nginx) proxies /api to
    # http://backend:8000 over the internal network, and Traefik fronts the
    # frontend. Publishing 8000 on the host only causes port conflicts on a
    # shared Portainer box. Re-add `ports` only if you need direct access.

  frontend:
    image: ghcr.io/securo-finance/securo-frontend:latest
    environment:
      BACKEND_URL: http://backend:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - backend
    restart: unless-stopped
    # Served through Traefik (no host port published). `default` keeps it on
    # the internal network so it can reach `backend`; `proxy` is the external
    # Traefik network you already run.
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.securo.rule=Host(`${SECURO_DOMAIN}`)"
      - "traefik.http.routers.securo.entrypoints=websecure"
      - "traefik.http.routers.securo.tls=true"
      - "traefik.http.routers.securo.tls.certresolver=le"
      - "traefik.http.services.securo.loadbalancer.server.port=80"

  celery-worker:
    <<: *backend-base
    # Limit to 2 workers to save RAM (default = number of CPUs).
    command: celery -A app.worker worker --loglevel=info --concurrency=2

  celery-beat:
    <<: *backend-base
    command: celery -A app.worker beat --loglevel=info

  # Optional: Securo built-in MCP server. Only starts under the `agents`
  # profile (`docker compose -f docker-compose.prod.yml --profile agents up`).
  # Reuses the backend image, just runs a different uvicorn entry point.
  # Modular by design — users not using the agents feature pay zero cost.
  #
  # Exposed through Traefik on its own subdomain (SECURO_MCP_DOMAIN) so
  # external agents — Claude Desktop, n8n, Hermes, custom clients — reach it
  # over HTTPS after minting a token from the UI. JWT auth is always required.
  #
  # NOTE: the in-app "External MCP access" panel still generates a URL with
  # `:8765`. When connecting Hermes, ignore that and use the Traefik URL:
  # https://${SECURO_MCP_DOMAIN}/mcp
  mcp-server:
    <<: *backend-base
    profiles: [agents]
    command: uvicorn mcp_server.main:app --host 0.0.0.0 --port 8765
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.securo-mcp.rule=Host(`${SECURO_MCP_DOMAIN}`)"
      - "traefik.http.routers.securo-mcp.entrypoints=websecure"
      - "traefik.http.routers.securo-mcp.tls=true"
      - "traefik.http.routers.securo-mcp.tls.certresolver=le"
      - "traefik.http.services.securo-mcp.loadbalancer.server.port=8765"

networks:
  # Your existing Traefik network. Must already exist on the host:
  #   docker network create proxy
  proxy:
    external: true
  default:
    driver: bridge

volumes:
  pgdata:
  attachments:
  agent_knowledge:
  agent_embedding_models:
